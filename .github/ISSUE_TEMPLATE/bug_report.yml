name: Bug report
description: Something in agent-sync isn't working the way it should.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug.

        **For security vulnerabilities, do NOT open a public issue.**
        Use GitHub's private vulnerability reporting from the Security tab — see SECURITY.md.
  - type: input
    id: version
    attributes:
      label: agent-sync version
      description: Output of `agent-sync --version` (or commit SHA if running from source).
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: command
    attributes:
      label: Which command misbehaves?
      multiple: true
      options:
        - init
        - add
        - list
        - compile
        - mcp install
        - other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run, and what was the output?
      placeholder: |
        $ npx agent-sync add db-navigator
        ... (paste the full output)
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: A public repo / gist / small zip that reproduces the issue. If it's truly trivial, paste the relevant files inline.
    validations:
      required: false
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: v20.11.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: detected
    attributes:
      label: Detected project context (if applicable)
      description: Paste `.agents/config.json` so we can see what agent-sync detected.
      render: json
    validations:
      required: false
